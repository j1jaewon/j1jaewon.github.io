name: C2P Newsletter → Jekyll Post

on:
  push:
    paths:
      - 'inbox/input.txt'
  workflow_dispatch:

jobs:
  process-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Process newsletter
        run: python3 scripts/process_newsletter_text.py inbox/input.txt

      - name: Commit post draft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/*-c2p-news.md
          git diff --staged --quiet || git commit -m "Auto: C2P newsletter draft $(date +'%Y-%m-%d')"
          git push
