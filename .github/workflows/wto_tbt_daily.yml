name: WTO TBT Daily Briefing

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 평일 매일 오전 9시 KST (UTC 00:00)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run WTO TBT briefing
        run: python3 scripts/wto_tbt_briefing.py
        env:
          DAYS_BACK: 1

      - name: Commit briefing post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/*-wto-tbt-briefing.md
          git diff --staged --quiet || git commit -m "Auto: WTO TBT briefing $(date +'%Y-%m-%d')"
          git push
